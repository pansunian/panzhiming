<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
    <meta name="theme-color" content="#e3e1d5" />
    <title>先见志明｜个人作品集</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@300;400;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['MyCustomTitle', 'Noto Serif SC', 'serif'],
              sans: ['MyCustomBody', 'Noto Sans SC', 'sans-serif'],
              mono: ['MyCustomMono', 'Space Mono', 'monospace'],
            },
            colors: {
              bg: '#e3e1d5',
              paper: '#fdfbf7',
              'paper-dark': '#f2efeb',
              ink: '#2b2926',
              'brand-accent': '#8a6d50',
              'brand-blue': '#4a729a',
            }
          }
        }
      }
    </script>
    <style>
      @font-face { 
        font-family: 'MyCustomTitle'; 
        src: url('/public/fonts/jinghualaosongti.woff') format('woff'); 
        font-weight: 400; 
        font-style: normal; 
        font-display: swap; 
      }
      @font-face { 
        font-family: 'MyCustomBody'; 
        src: url('/public/fonts/XiXianTingMingTi.woff2') format('woff2'); 
        font-weight: 400; 
        font-style: normal; 
        font-display: swap; 
      }
      @font-face { 
        font-family: 'MyCustomMono'; 
        src: url('/public/fonts/MyMono.woff2') format('woff2'); 
        font-weight: 400; 
        font-style: normal; 
        font-display: swap; 
      }

      :root {
        --bg-color: #e3e1d5;
        --noise-url: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
      }

      body { 
        background-color: var(--bg-color); 
        background-image: var(--noise-url); 
        background-attachment: fixed; 
        color: #2b2926; 
        margin: 0; 
        padding: 0; 
      }
      .bg-texture { 
        background-color: var(--bg-color);
        background-image: var(--noise-url); 
        background-attachment: fixed;
      }
      
      .jagged-bottom { 
        -webkit-mask: linear-gradient(-135deg, transparent 6px, #000 0) 0 50%, linear-gradient(135deg, transparent 6px, #000 0) 0 50%; 
        -webkit-mask-size: 12px 100%; 
        -webkit-mask-repeat: repeat-x; 
        -webkit-mask-position: left bottom; 
      }
      .jagged-top { 
        -webkit-mask: linear-gradient(45deg, transparent 6px, #000 0) 0 50%, linear-gradient(-45deg, transparent 6px, #000 0) 0 50%; 
        -webkit-mask-size: 12px 100%; 
        -webkit-mask-repeat: repeat-x; 
        -webkit-mask-position: left top; 
      }
      .jagged-right { 
        -webkit-mask: linear-gradient(135deg, transparent 6px, #000 0) 50% 0, linear-gradient(225deg, transparent 6px, #000 0) 50% 0; 
        -webkit-mask-size: 100% 12px; 
        -webkit-mask-repeat: repeat-y; 
        -webkit-mask-position: right top; 
      }
      
      .sawtooth-y { 
        background-image: linear-gradient(135deg, #ffffff 25%, transparent 25%), linear-gradient(225deg, #ffffff 25%, transparent 25%); 
        background-position: 0 0; 
        background-size: 16px 16px; 
        height: 8px; 
        width: 100%; 
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
