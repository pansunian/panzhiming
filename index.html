<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的旅程 | Life, Now Showing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Importing Noto Serif SC (Songti) for artistic text and Noto Sans SC for body text -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@300;400;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['"Noto Serif SC"', 'serif'],
              sans: ['"Noto Sans SC"', 'sans-serif'],
              mono: ['"Space Mono"', 'monospace'],
            },
            colors: {
              bg: '#e3e1d5', // Warm Grey/Beige background (Archive style)
              paper: '#fdfbf7', // Very light off-white/cream for tickets
              'paper-dark': '#f2efeb', // Slightly darker cream for accents
              ink: '#2b2926', // Soft Charcoal instead of pure black
              'brand-accent': '#8a6d50', // Coffee/Bronze color
              'brand-blue': '#4a729a',
            },
            boxShadow: {
              'ticket': '0 2px 20px -2px rgba(43, 41, 38, 0.1), 0 8px 30px -4px rgba(43, 41, 38, 0.05)',
              'ticket-hover': '0 10px 40px -4px rgba(43, 41, 38, 0.15)',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --bg-color: #e3e1d5;
        --noise-url: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
      }

      body {
        background-color: var(--bg-color);
        color: #2b2926;
        background-image: var(--noise-url);
        background-attachment: fixed;
      }
      
      .bg-texture {
        background-color: var(--bg-color);
        background-image: var(--noise-url);
        background-attachment: fixed;
      }

      .jagged-bottom {
        background: inherit;
        -webkit-mask: linear-gradient(-135deg, transparent 6px, #000 0) 0 50%,
                      linear-gradient(135deg, transparent 6px, #000 0) 0 50%;
        -webkit-mask-size: 12px 100%;
        -webkit-mask-repeat: repeat-x;
        -webkit-mask-position: left bottom;
      }

      .jagged-top {
        background: inherit;
        -webkit-mask: linear-gradient(45deg, transparent 6px, #000 0) 0 50%,
                      linear-gradient(-45deg, transparent 6px, #000 0) 0 50%;
        -webkit-mask-size: 12px 100%;
        -webkit-mask-repeat: repeat-x;
        -webkit-mask-position: left top;
      }

      /* 
       * Updated Jagged Right (Scalloped Edge) 
       * Height is 128px (h-32). 
       * Mask Size 32px divides 128px exactly 4 times. 
       * Hole is centered at 50% of 32px (16px).
       * Radius 4px.
       * This ensures solid corners at top (0px) and bottom (128px).
       */
      .jagged-right {
        background: inherit;
        -webkit-mask: radial-gradient(circle at 100% 50%, transparent 4px, black 4.5px);
        -webkit-mask-size: 100% 32px;
        -webkit-mask-repeat: repeat-y;
        -webkit-mask-position: right top;
      }

      .sawtooth-y {
        background-image: linear-gradient(135deg, #ffffff 25%, transparent 25%), 
                          linear-gradient(225deg, #ffffff 25%, transparent 25%);
        background-position: 0 0;
        background-size: 16px 16px;
        height: 8px;
        width: 100%;
      }
      
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #b0aba0;
        border-radius: 3px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "vite": "https://esm.sh/vite@^7.3.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
