name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Create .env file
        run: |
          cat > .env << EOF
          NOTION_API_KEY=${{ secrets.NOTION_API_KEY }}
          NOTION_BLOG_DB_ID=${{ secrets.NOTION_BLOG_DB_ID }}
          NOTION_CONTACT_DB_ID=${{ secrets.NOTION_CONTACT_DB_ID }}
          NOTION_GALLERY_DB_ID=${{ secrets.NOTION_GALLERY_DB_ID }}
          NOTION_MANUAL_PAGE_ID=${{ secrets.NOTION_MANUAL_PAGE_ID }}
          NOTION_PROFILE_DB_ID=${{ secrets.NOTION_PROFILE_DB_ID }}
          NOTION_THOUGHTS_DB_ID=${{ secrets.NOTION_THOUGHTS_DB_ID }}
          EOF

      - name: Deploy via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "index.html, src/, public/, package.json, pnpm-lock.yaml, .env, vite.config.js, tsconfig.json, types.ts, App.tsx, index.tsx, metadata.json, vercel.json, api/, components/, data/, utils/"
          target: "/var/www/your-project"
          strip_components: 0

      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/your-project
            pnpm install --prod
            pm2 delete your-app-name 2>/dev/null || true
            pm2 start "npx vite --host 0.0.0.0" --name your-app-name
            pm2 save
