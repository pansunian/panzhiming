name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Create .env file
        run: |
          cat > .env << EOF
          NOTION_KEY=${{ secrets.NOTION_KEY }}
          NOTION_DATABASE_ID=${{ secrets.NOTION_DATABASE_ID }}
          # 如果有其他环境变量，按相同格式添加
          EOF

      # 注意：Vite 开发模式不需要构建，所以跳过 build 步骤
      # 如果需要构建生产版本，可以取消下面注释，并修改启动命令
      # - name: Build project
      #   run: pnpm build

      - name: Deploy via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # 上传所有必要的源代码文件（根据你的截图）
          source: |
            index.html
            src/
            public/
            package.json
            pnpm-lock.yaml
            .env
            vite.config.js
            tsconfig.json
            types.ts
            App.tsx
            index.tsx
            metadata.json
            vercel.json
            api/
            components/
            data/
            utils/
          target: "/var/www/your-project"
          strip_components: 0

      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/your-project
            # 安装生产依赖（pnpm 会自动处理）
            pnpm install --prod
            # 使用 PM2 启动开发服务器（监听所有接口）
            # 先停止旧进程（如果有），再启动新进程
            pm2 delete your-app-name 2>/dev/null || true
            pm2 start "npx vite --host 0.0.0.0" --name your-app-name
            pm2 save
