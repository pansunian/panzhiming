name: Update Website Content

on:
  workflow_dispatch:
    inputs:
      update_mode:
        description: '更新模式：smart 只处理新增/修改内容；full 完整重建'
        type: choice
        required: true
        default: smart
        options:
          - smart
          - full
  push:
    branches:
      - main

concurrency:
  group: update-website-content
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    env:
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_PROFILE_DB_ID: ${{ secrets.NOTION_PROFILE_DB_ID }}
      NOTION_GALLERY_DB_ID: ${{ secrets.NOTION_GALLERY_DB_ID }}
      NOTION_THOUGHTS_DB_ID: ${{ secrets.NOTION_THOUGHTS_DB_ID }}
      NOTION_BLOG_DB_ID: ${{ secrets.NOTION_BLOG_DB_ID }}
      ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      ALIYUN_OSS_BUCKET: ${{ vars.ALIYUN_OSS_BUCKET || 'panzhiming-notion' }}
      ALIYUN_OSS_ENDPOINT: ${{ vars.ALIYUN_OSS_ENDPOINT || 'oss-cn-shanghai.aliyuncs.com' }}
      STATIC_BASE_URL: ${{ vars.STATIC_BASE_URL || 'https://panzhiming.com' }}
      UPDATE_MODE: ${{ github.event.inputs.update_mode || 'full' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required secrets
        shell: bash
        run: |
          required=(
            NOTION_API_KEY
            NOTION_PROFILE_DB_ID
            NOTION_GALLERY_DB_ID
            NOTION_THOUGHTS_DB_ID
            NOTION_BLOG_DB_ID
            ALIYUN_ACCESS_KEY_ID
            ALIYUN_ACCESS_KEY_SECRET
          )
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing secret::$name is not set."
              exit 1
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm install --include=optional
          npm install --no-save @rollup/rollup-linux-x64-gnu@4.60.4

      - name: Build static site from Notion
        run: npm run build

      - name: Install ossutil
        shell: bash
        run: |
          curl -L -o ossutil.zip https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil-v1.7.19-linux-amd64.zip
          unzip -q ossutil.zip
          OSSUTIL_BIN="$(find . -type f \( -name 'ossutil64' -o -name 'ossutil' \) | head -n 1)"
          cp "$OSSUTIL_BIN" ./ossutil64
          chmod +x ossutil64
          ./ossutil64 config \
            -e "$ALIYUN_OSS_ENDPOINT" \
            -i "$ALIYUN_ACCESS_KEY_ID" \
            -k "$ALIYUN_ACCESS_KEY_SECRET" \
            -L CH

      - name: Upload dist to Aliyun OSS
        shell: bash
        run: |
          while IFS= read -r file; do
            key="${file#dist/}"
            ./ossutil64 cp -f "$file" "oss://$ALIYUN_OSS_BUCKET/$key"
          done < <(find dist -type f | sort)

          if [ -f dist/data/static-routes.json ]; then
            node -e 'const fs=require("fs"); const data=JSON.parse(fs.readFileSync("dist/data/static-routes.json","utf8")); for (const route of data.routes || []) console.log(route);' | while IFS= read -r route; do
              [ -n "$route" ] || continue
              ./ossutil64 cp -f dist/index.html "oss://$ALIYUN_OSS_BUCKET/$route"
              ./ossutil64 set-meta "oss://$ALIYUN_OSS_BUCKET/$route" Content-Type:text/html --update
            done
          fi

      - name: Write deployment summary
        run: |
          {
            echo "### Website content updated"
            echo ""
            echo "- Bucket: \`$ALIYUN_OSS_BUCKET\`"
            echo "- Endpoint: \`$ALIYUN_OSS_ENDPOINT\`"
            echo "- Source: Notion static sync"
          } >> "$GITHUB_STEP_SUMMARY"
